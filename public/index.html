<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Inspiration | CodeOrbit Tech Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #ff007f, #7928ca); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .quote-card {
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        .btn-next {
            background: linear-gradient(135deg, #7928ca, #ff007f);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 25px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-next:hover {
            transform: scale(1.03);
            color: white;
        }
    </style>
</head>
<body>

    <div class="quote-card">
        <h5 class="text-uppercase tracking-wider text-muted mb-3" style="font-size: 0.85rem; letter-spacing: 2px;">
            Task 3: Full-Stack Quote Generator
        </h5>
        
        <!-- Quote Display Area -->
        <div class="my-4">
            <h2 id="quoteText" class="fs-3 fw-bold text-dark mb-2">"Loading your daily dose of inspiration..."</h2>
            <p id="quoteAuthor" class="text-secondary italic fs-6">— CodeOrbit Tech</p>
        </div>

        <!-- Trigger Button -->
        <button id="nextBtn" class="btn btn-next shadow-sm mt-3">Get Another Quote</button>
    </div>

    <script>
        const quoteText = document.getElementById('quoteText');
        const quoteAuthor = document.getElementById('quoteAuthor');
        const nextBtn = document.getElementById('nextBtn');

        // Function to fetch a random quote from the backend API
        async function getNewQuote() {
            try {
                // Disable button momentarily during fetch
                nextBtn.disabled = true;
                
                const response = await fetch('/api/quote');
                const data = await response.json();
                
                // Animate/Inject text into the UI
                quoteText.textContent = `"${data.quote}"`;
                quoteAuthor.textContent = `— ${data.author}`;
            } catch (error) {
                quoteText.textContent = "Oops! Couldn't connect to the backend API.";
                quoteAuthor.textContent = "— Error";
            } finally {
                nextBtn.disabled = false;
            }
        }

        // Fetch a quote automatically on page load
        getNewQuote();

        // Fetch a new quote when clicking the button
        nextBtn.addEventListener('click', getNewQuote);
    </script>
</body>
</html>
